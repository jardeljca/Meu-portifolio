<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
    />

    <link rel="stylesheet" href="./src/css/estilo.css" />
    <link rel="stylesheet" href="./src/css/reset.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kode+Mono:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/bf08065381.js"
      crossorigin="anonymous"
    ></script>

    <title>Portifólio Jardel Queiroz</title>
  </head>
  <body>
    <header>
      <div class="header" id="header">
        <h1 id="h1Header"><span>Jardel</span> Queiroz</h1>
        <i
          class="iconeMenu fa-solid fa-bars fa-beat-fade"
          style="color: #f59000"
          id="iconeMenu"
        ></i>
      </div>
      <nav id="menuNav">
        <div class="tiluloNav">
          <h2>Jardel Queiroz</h2>
          <i
            class="iconeMenuX fa-solid fa-x fa-beat"
            style="color: #f59000"
            id="iconeMenuX"
          ></i>
        </div>

        <ul>
          <p>Quem sou eu</p>
          <p>Meus projetos</p>
          <p>Minhas Stacks</p>
          <p>Formação</p>
          <p>Minha trajetória</p>
          <p>Contato</p>
        </ul>
      </nav>
    </header>
    <main>
      <section class="apresentacao">
        <h3>Seja bem vindo</h3>
        <h2>Sou Jardel Queiroz</h2>
        <h4>desenvolvedor full-stack</h4>
        <div class="circulo">
          <img src="./src/img/jardel.png" alt="img Jardel">
          <i class="fa-brands fa-html5 fa-bounce htmlIcon"></i>
          <i class="fa-brands fa-css3-alt fa-beat-fade cssIcon"></i>
          <i class="fa-brands fa-js fa-spin fa-spin-reverse jsIcon"></i>
          <i class="fa-brands fa-java fa-flip javaIcon"></i>
          <i class="fa-brands fa-square-github fa-spin-pulse githubIcon"></i>
        </div>
      </section>
      <section class="quemSouEu">
        <h2>Quem sou eu</h2>
      </section>
      <section class="projetos">
        <h2>Meus projetos</h2>
      </section>
      <section class="stacks">
        <h2>Minhas stacks</h2>
      </section>
      <section class="formacao">
        <h2>Formação acadêmica e cursos</h2>
      </section>
      <section class="experiencia">
        <h2>Minha trajetória</h2>
      </section>
    </main>
    <footer>
      
    </footer>
    
    <script src="./src/js/index.js"></script>
  </body>
</html>
